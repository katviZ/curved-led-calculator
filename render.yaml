services:
  - type: web
    name: curved-led-calculator
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        generateValue: true
    disk:
      name: xml-data
      mountPath: /opt/render/project/src/server/db
      sizeGB: 1
